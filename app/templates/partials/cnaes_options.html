{% for c in cnaes %}
<button type="button"
        onclick="selecionarCnae('{{ c.codigo }}', '{{ c.descricao | replace("'", "\\'") }}')"
        class="w-full text-left text-xs px-2 py-1.5 rounded hover:bg-blue-50 hover:text-blue-700 border border-transparent hover:border-blue-200 transition-colors">
  <span class="font-mono text-gray-400">{{ c.codigo }}</span>
  <span class="ml-1 text-gray-700">{{ c.descricao }}</span>
</button>
{% endfor %}
