<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBR Leads — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            orange: { 500: '#f97316', 600: '#ea580c' }
          }
        }
      }
    }
  </script>
  <style>body { background-color: #0f0f0f; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="flex items-center justify-center gap-2 mb-2">
        <span class="text-orange-500 font-black text-2xl tracking-tight">SBR</span>
        <span class="text-white font-light text-2xl tracking-widest">Leads</span>
      </div>
      <p class="text-sm text-[#555]">Faça login para continuar</p>
    </div>

    <div class="bg-[#171717] rounded-2xl border border-[#2e2e2e] p-8">
      {% if erro %}
      <div class="mb-4 text-sm text-red-400 bg-red-900/20 border border-red-900/40 rounded-lg px-4 py-3">
        {{ erro }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-[#888] mb-1 uppercase tracking-wide">E-mail</label>
          <input type="email" name="email" required autofocus
                 class="w-full rounded-lg bg-[#222] border border-[#3a3a3a] px-3 py-2.5 text-sm text-[#e5e5e5] placeholder-[#555] focus:outline-none focus:border-orange-500 transition-colors"
                 placeholder="seu@email.com" />
        </div>
        <div>
          <label class="block text-xs font-medium text-[#888] mb-1 uppercase tracking-wide">Senha</label>
          <input type="password" name="senha" required
                 class="w-full rounded-lg bg-[#222] border border-[#3a3a3a] px-3 py-2.5 text-sm text-[#e5e5e5] placeholder-[#555] focus:outline-none focus:border-orange-500 transition-colors"
                 placeholder="••••••••" />
        </div>
        <button type="submit"
                class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2.5 rounded-lg transition-colors mt-2">
          Entrar
        </button>
      </form>
    </div>
  </div>
</body>
</html>
