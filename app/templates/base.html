<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SBR LEED'S{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            orange: {
              400: '#fb923c',
              500: '#f97316',
              600: '#ea580c',
            },
            surface: {
              900: '#0f0f0f',
              800: '#171717',
              700: '#222222',
              600: '#2e2e2e',
              500: '#3a3a3a',
            }
          }
        }
      }
    }
  </script>

  <style>
    body { background-color: #0f0f0f; color: #e5e5e5; }
    #mapa { height: 460px; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request.htmx-indicator { display: inline-block; }
    select option { background: #222; color: #e5e5e5; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #171717; }
    ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #f97316; }
  </style>
</head>
<body class="min-h-screen">

  <header class="border-b border-[#2e2e2e]">
    <div class="max-w-7xl mx-auto px-5 py-3 flex items-center gap-2">
      <span class="text-orange-500 font-black text-lg tracking-tight">SBR</span>
      <span class="text-white font-light text-lg tracking-widest">LEED'S</span>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-5 py-5">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
