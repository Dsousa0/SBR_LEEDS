<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SBR Leads{% endblock %}</title>

  <!-- Tailwind CDN: gera CSS dinamicamente, não suporta SRI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"
          integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"
          crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H"
        crossorigin="anonymous" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
        integrity="sha384-pmjIAcz2bAn0xukfxADbZIb3t8oRT9Sv0rvO+BR5Csr6Dhqq+nZs59P0pPKQJkEV"
        crossorigin="anonymous" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
        integrity="sha384-wgw+aLYNQ7dlhK47ZPK7FRACiq7ROZwgFNg0m04avm4CaXS+Z9Y7nMu8yNjBKYC+"
        crossorigin="anonymous" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
          integrity="sha384-eXVCORTRlv4FUUgS/xmOyr66XBVraen8ATNLMESp92FKXLAMiKkerixTiBvXriZr"
          crossorigin="anonymous"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            orange: {
              400: '#fb923c',
              500: '#f97316',
              600: '#ea580c',
            },
            surface: {
              900: '#0f0f0f',
              800: '#171717',
              700: '#222222',
              600: '#2e2e2e',
              500: '#3a3a3a',
            }
          }
        }
      }
    }
  </script>

  <style>
    body { background-color: #0f0f0f; color: #e5e5e5; }
    #mapa { height: 460px; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request.htmx-indicator { display: inline-block; }
    select option { background: #222; color: #e5e5e5; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #171717; }
    ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #f97316; }

    /* Modo expandido do mapa — overlay cobrindo toda a viewport */
    #tabs-container.mapa-expandido {
      position: fixed; inset: 0; z-index: 50; border-radius: 0;
      display: flex; flex-direction: column;
    }
    #tabs-container.mapa-expandido > #abas { flex-shrink: 0; }
    #tabs-container.mapa-expandido #painel-mapa { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    #tabs-container.mapa-expandido #mapa { flex: 1; height: auto !important; }

    /* Cluster do Leaflet — tema laranja, sobrescreve o azul/verde/amarelo padrão */
    .marker-cluster-pm {
      background-color: rgba(249, 115, 22, 0.35);
      border-radius: 50%;
    }
    .marker-cluster-pm div {
      background-color: rgba(249, 115, 22, 0.9);
      width: 30px; height: 30px;
      margin: 5px;
      border-radius: 50%;
      color: #fff;
      font-weight: 600;
      text-align: center;
      line-height: 30px;
      font-size: 12px;
    }
  </style>
</head>
<body class="min-h-screen">

  <header class="border-b border-[#2e2e2e]">
    <div class="max-w-7xl mx-auto px-5 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-orange-500 font-black text-lg tracking-tight">SBR</span>
        <span class="text-white font-light text-lg tracking-widest">Leads</span>
      </div>
      {% if user is defined and user %}
      <div class="flex items-center gap-4">
        <span class="text-sm text-[#888]">{{ user.nome }}</span>
        {% if user.role == 'admin' %}
        <a href="/admin/usuarios"
           class="text-xs text-orange-500 hover:text-orange-400 transition-colors">Admin</a>
        {% endif %}
        <a href="/logout"
           class="text-xs text-[#555] hover:text-[#999] transition-colors">Sair</a>
      </div>
      {% endif %}
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-5 py-5">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
